<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">

    <title>POS System Meatballs</title>

    <!-- PWA & Mobile Meta Tags -->
    <meta name="theme-color" content="#212c3b">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black"> 
    <meta name="apple-mobile-web-app-title" content="POS Meatballs">
    
    <!-- Icons -->
    <link rel="apple-touch-icon" href="icon-192x192.png"> 
    <link rel="icon" type="image/png" sizes="192x192" href="icon-192x192.png">
    <link rel="shortcut icon" href="icon-192x192.png">

    <!-- Manifest -->
    <link rel="manifest" href="manifest.json">

    <style>
        /* รีเซ็ตค่าและล็อคการเลื่อนหน้าจอหลัก */
        /* 1. Reset & Base Styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            height: 100%;
            width: 100%;          
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #212c3b;
            overflow: hidden; /* ล็อคไม่ให้ดึงหน้าเว็บหลักได้ */
            touch-action: none;
        }

        /* หน้าจอโหลดดิ้ง (Splash Screen) ปิดบังจังหวะที่ App Script กำลังโหลด */
        #loader {
            position: absolute;
            inset: 0;
            background-color: #212c3b; /* สีเดียวกับธีม */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            color: white;
            transition: opacity 0.5s ease;
        }

        /* โลโก้แอปในหน้าโหลดดิ้ง */
        .loader-logo {
            width: 90px;
            height: 90px;
            margin-bottom: 25px;
            border-radius: 20px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.2);
            animation: pulseLogo 2s infinite ease-in-out;
        }

        @keyframes pulseLogo {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        /* Animation แบบใหม่: จุดกระโดด 3 จุด (Bouncing Dots) */
        .loader-dots {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
        }

        .loader-dots div {
            width: 14px;
            height: 14px;
            background-color: #ffffff;
            border-radius: 50%;
            animation: bounce 0.6s infinite alternate;
        }

        .loader-dots div:nth-child(1) { animation-delay: 0s; }
        .loader-dots div:nth-child(2) { animation-delay: 0.2s; }
        .loader-dots div:nth-child(3) { animation-delay: 0.4s; }

        @keyframes bounce {
            from { transform: translateY(0); opacity: 0.6; }
            to { transform: translateY(-12px); opacity: 1; background-color: #64b5f6; }
        }

        /* เพิ่ม Effect ให้ตัวหนังสือกระพริบเบาๆ (Pulse) */
        .loading-text {
            font-size: 16px;
            letter-spacing: 1.5px;
            color: #e0e0e0;
            animation: pulseText 1.5s infinite ease-in-out;
        }

        @keyframes pulseText {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }
        
        /* ขึง iframe ให้เต็มหน้าจอแบบแน่นอน */
        iframe {
            display: flex;
            flex-direction: column;
            height: 100dvh; /* Use Dynamic Viewport Height */
            width: 100%;
            border: none;
            
            /* ใช้ค่า env() เพื่อเว้นระยะจากขอบจอ iPhone */
            /* padding-top: env(safe-area-inset-top); */
            /* padding-bottom: env(safe-area-inset-bottom); */
            /* padding-left: env(safe-area-inset-left); */
            /* padding-right: env(safe-area-inset-right); */
            
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
        }
    </style>
</head>
<body>
    
    <!-- เพิ่ม Loading Screen แบบใหม่เข้ามา -->
    <div id="loader">
        <img src="icon-192x192.png" alt="POS Logo" class="loader-logo" onerror="this.style.display='none'">
        <div class="loader-dots">
            <div></div><div></div><div></div>
        </div>
        <div class="loading-text">กำลังโหลดระบบ...</div>
    </div>
    
    <!-- iframe ที่จะใช้ฝัง App Script ของเรา -->
    <iframe id="app-iframe" src="" allow="camera; microphone; display-capture; clipboard-read; clipboard-write; geolocation" allowfullscreen></iframe>

    <script>
        // URL ของ App Script
        const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwXIiCvvcmHsW6Wvn7UXt6iKZhVy7oYGy3zu4q7oCR7uiudRysUhX5PKe2QhNvwbUdN/exec';

        const iframe = document.getElementById('app-iframe');
        const params = window.location.search;
        const iframeSrc = APPS_SCRIPT_URL + params;
        iframe.src = iframeSrc;

        // ฟังก์ชันสำคัญ: ปรับความสูงของ iframe ให้เท่ากับพื้นที่ที่มองเห็นได้จริงๆ 
        function resizeIframe() {
            iframe.style.height = window.innerHeight + 'px';
        }

        // สั่งให้ทำงานตอนเปิดเว็บครั้งแรก
        resizeIframe();
        window.addEventListener('resize', resizeIframe);
        window.addEventListener('orientationchange', function() {
            setTimeout(resizeIframe, 100);
        });

        // ฟังก์ชันสำหรับซ่อนหน้าจอโหลด
        function hideLoader() {
            const loader = document.getElementById('loader');
            if (loader && loader.style.display !== 'none') {
                loader.style.opacity = '0'; 
                setTimeout(() => { loader.style.display = 'none'; }, 500);
            }
        }

        // 1. เมื่อ iframe โหลด App Script เสร็จสมบูรณ์ ให้ซ่อนหน้าจอ Loading
        iframe.onload = hideLoader;

        // 2. ระบบกันค้าง (Fallback Timeout)
        setTimeout(hideLoader, 12000); 

        // 3. ระบบ Service Worker สำหรับ Cache ไฟล์หน้าเว็บ (ทำให้เปิดแอปไวขึ้น)
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(registration => { console.log('Service Worker registered successfully'); })
                    .catch(err => { console.log('Service Worker registration failed: ', err); });
            });
        }
    </script>
</body>
</html>
