<!DOCTYPE html>
<html lang="th">
<head>
    <base target="_top">
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    
    <!-- Viewport สำหรับ PWA และรองรับ Notch (รอยบาก) -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <title>POS System Chaisiri</title>

    <!-- PWA & Mobile Meta Tags -->
    <!-- ปรับ theme-color ให้ตรงกับสีแถบด้านบนของแอป (สีน้ำเงินเข้ม) เพื่อความกลมกลืน -->
    <meta name="theme-color" content="#212c3b">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <!-- ใช้ black-translucent เพื่อให้แอปดูเต็มจอและกลืนกับสีพื้นหลังมากที่สุด -->
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"> 
    <meta name="apple-mobile-web-app-title" content="POS Chaisiri">
    
    <!-- Icons -->
    <link rel="apple-touch-icon" href="icon-192x192.png"> 
    <link rel="icon" type="image/png" sizes="192x192" href="icon-192x192.png">
    <link rel="shortcut icon" href="icon-192x192.png">

    <!-- Manifest -->
    <link rel="manifest" href="manifest.json">

    <style>
        /* รีเซ็ตค่าและล็อคการเลื่อนหน้าจอหลัก */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            /* ใช้ dvh เพื่อปรับขนาดตาม Address bar ของมือถือแบบไดนามิก */
            height: 100dvh; 
            /* Fallback สำหรับ iOS เวอร์ชั่นเก่าๆ */
            min-height: -webkit-fill-available;
            
            /* เปลี่ยนสีพื้นหลังให้กลืนกับแถบด้านบนของแอป (สีน้ำเงินเข้ม) */
            background-color: #212c3b; 
            overflow: hidden; /* ล็อคไม่ให้ดึงหน้าเว็บหลักได้ */
            
            /* ป้องกันการเด้ง (Rubber-band effect) บน iOS ให้เหมือนแอป Native */
            overscroll-behavior: none;
            touch-action: none;
        }

        /* หน้าจอโหลดดิ้ง (Splash Screen) ปิดบังจังหวะที่ App Script กำลังโหลด */
        #loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #212c3b; /* สีเดียวกับธีม */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            transition: opacity 0.5s ease;
        }

        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.2);
            border-top: 4px solid #ffffff;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin-bottom: 15px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* ขึง iframe ให้เต็มหน้าจอ */
        iframe {
            display: block;
            width: 100%;
            height: 100%; 
            border: none;
            box-sizing: border-box;
            background-color: #f4f7f6; /* สีพื้นหลังเดิมของแอปลงมาไว้ที่นี่แทน */
            
            /* ป้องกันรอยบาก (Notch) และขอบมนของ iPhone ทับเนื้อหาใน iframe */
            padding-top: env(safe-area-inset-top);
            padding-bottom: env(safe-area-inset-bottom);
            padding-left: env(safe-area-inset-left);
            padding-right: env(safe-area-inset-right);
        }
    </style>
</head>
<body>

    <!-- เพิ่ม Loading Screen เข้ามา -->
    <div id="loader">
        <div class="spinner"></div>
        <div>กำลังโหลดระบบ...</div>
    </div>

    <!-- iframe ที่จะใช้ฝัง App Script ของเรา -->
    <iframe id="app-iframe" src="" allow="camera; microphone; display-capture; clipboard-read; clipboard-write; geolocation" allowfullscreen></iframe>

    <script>
        // URL ของ App Script
        const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzuAoteT9I7knF_PwtVNmlwKM5v0ultveceBmgSLikbqge1VWrWhALllbJP-U9Bs0yJZg/exec';

        const iframe = document.getElementById('app-iframe');
        const params = window.location.search;
        const iframeSrc = APPS_SCRIPT_URL + params;
        
        // เมื่อ iframe โหลด App Script เสร็จสมบูรณ์ ให้ซ่อนหน้าจอ Loading
        iframe.onload = function() {
            const loader = document.getElementById('loader');
            if (loader) {
                loader.style.opacity = '0'; // ค่อยๆ จางหายไป
                setTimeout(() => {
                    loader.style.display = 'none'; // เอาออกจากหน้าจอหลังจาก 0.5 วินาที
                }, 500);
            }
        };

        iframe.src = iframeSrc;

        // ไม่ต้องใช้ Javascript คำนวณความสูง (resizeIframe) อีกต่อไป 
        // เพราะเราปล่อยให้ CSS 100dvh จัดการให้แทน ซึ่งเสถียรกว่ามากบน iOS
    </script>
</body>
</html>
